<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트립비토즈 이메일 에디터</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','맑은 고딕',Helvetica,sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

/* ── TOPBAR ── */
.topbar {
  height: 48px; background: #121212;
  display: flex; align-items: center; padding: 0 20px;
  justify-content: space-between; position: fixed;
  top: 0; left: 0; right: 0; z-index: 200;
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-logo span { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.topbar-logo small { font-size: 11px; color: #888; margin-left: 4px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn-top { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.15s; }
.btn-top.primary { background: #7B3CFF; color: #fff; }
.btn-top.primary:hover { background: #6930e0; }
.btn-top.secondary { background: #2a2a2a; color: #ccc; border: 1px solid #444; }
.btn-top.secondary:hover { background: #333; color: #fff; }
#tpl-name-input {
  padding: 5px 12px; font-size: 13px; border: 1px solid #333;
  border-radius: 6px; background: #1e1e1e; color: #fff; width: 200px; outline: none;
}
#tpl-name-input:focus { border-color: #7B3CFF; }

/* ── VIEW SWITCHING ── */
.view { display: none; }
.view.active { display: block; }
#view-editor { display: none; }
#view-editor.active { display: flex; }

/* ══════════════════════════════════════════
   LIST VIEW
══════════════════════════════════════════ */
#view-list { padding: 68px 32px 40px; max-width: 1100px; margin: 0 auto; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.list-title { font-size: 20px; font-weight: 700; color: #181818; }
.list-sub { font-size: 13px; color: #999; margin-top: 3px; }
.btn-primary { padding: 9px 20px; background: #7B3CFF; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: #6930e0; }
.btn-secondary { padding: 7px 14px; background: #fff; color: #555; border: 1px solid #e0e0e0; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-secondary:hover { border-color: #7B3CFF; color: #7B3CFF; }
.btn-danger { padding: 7px 14px; background: #fff; color: #e24b4a; border: 1px solid #fdd; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-danger:hover { background: #fff5f5; }

.tpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.tpl-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; transition: box-shadow 0.15s, border-color 0.15s; }
.tpl-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #ccc; }
.tpl-thumb {
  height: 170px; background: #f8f8f8;
  border-bottom: 1px solid #f0f0f0; overflow: hidden;
  position: relative; cursor: pointer;
}
.tpl-thumb-inner { transform-origin: top left; pointer-events: none; width: 600px; }
.tpl-thumb-overlay {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: rgba(0,0,0,0); transition: background 0.2s;
}
.tpl-card:hover .tpl-thumb-overlay { background: rgba(123,60,255,0.07); }
.tpl-thumb-overlay span {
  font-size: 12px; font-weight: 600; color: #7B3CFF;
  background: #fff; padding: 6px 14px; border-radius: 20px;
  border: 1px solid #c4a8ff; opacity: 0; transition: opacity 0.2s;
}
.tpl-card:hover .tpl-thumb-overlay span { opacity: 1; }
.tpl-info { padding: 12px 16px 4px; }
.tpl-name { font-size: 14px; font-weight: 600; color: #181818; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tpl-meta { font-size: 11px; color: #bbb; margin-top: 3px; }
.tpl-actions { display: flex; gap: 6px; padding: 10px 16px 14px; }
.empty-state { grid-column: 1/-1; text-align: center; padding: 80px 0; }
.empty-state p { font-size: 15px; font-weight: 500; color: #999; margin: 16px 0 6px; }
.empty-state small { font-size: 12px; color: #bbb; }

/* ══════════════════════════════════════════
   EDITOR VIEW
══════════════════════════════════════════ */
#view-editor { height: 100vh; padding-top: 48px; }

.left {
  width: 370px; min-width: 370px;
  background: #fafafa; border-right: 1px solid #e0e0e0;
  display: flex; flex-direction: column; overflow: hidden;
}
.left-header { padding: 12px 16px 8px; border-bottom: 1px solid #e8e8e8; background: #fff; }
.left-header h2 { font-size: 13px; font-weight: 600; color: #181818; }
.left-header p { font-size: 11px; color: #999; margin-top: 2px; }
.add-bar { padding: 9px 12px; border-bottom: 1px solid #e8e8e8; background: #fff; display: flex; flex-wrap: wrap; gap: 4px; }
.add-bar-label { width: 100%; font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.add-btn { font-size: 11px; padding: 3px 9px; border: 1px solid #e0e0e0; border-radius: 20px; background: #fff; cursor: pointer; color: #555; transition: all 0.15s; }
.add-btn:hover { background: #f0ebff; border-color: #7B3CFF; color: #7B3CFF; }
.block-list { flex: 1; overflow-y: auto; padding: 8px; }
.block-list::-webkit-scrollbar { width: 4px; }
.block-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
.block-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s; }
.block-item.active { border-color: #7B3CFF; box-shadow: 0 0 0 2px #f0ebff; }
.block-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: grab; user-select: none; }
.block-header:hover { background: #f5f2ff; }
.block-header:active { cursor: grabbing; }
.drag-handle { color: #bbb; font-size: 14px; padding: 0 2px; }
.drag-handle:hover { color: #7B3CFF; }
.block-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f0ebff; color: #7B3CFF; white-space: nowrap; }
.block-summary { flex: 1; font-size: 11px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.block-chevron { font-size: 10px; color: #bbb; transition: transform 0.2s; }
.block-item.active .block-chevron { transform: rotate(180deg); }
.block-actions { display: flex; gap: 3px; }
.ba { width: 24px; height: 24px; border: 1px solid #e8e8e8; border-radius: 5px; background: #fff; cursor: pointer; font-size: 11px; color: #999; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
.ba:hover { background: #f5f5f5; color: #555; }
.ba.del:hover { color: #e24b4a; border-color: #e24b4a; background: #fff5f5; }
.block-editor { padding: 12px; border-top: 1px solid #f0f0f0; display: none; background: #fdfdfd; max-height: 500px; overflow-y: auto; }
.block-editor.open { display: block; }
.fl { font-size: 10px; font-weight: 600; color: #aaa; margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
.fl:first-child { margin-top: 0; }
.fi { width: 100%; padding: 7px 10px; font-size: 12px; border: 1px solid #e8e8e8; border-radius: 6px; background: #fff; color: #222; font-family: 'Malgun Gothic',Helvetica,sans-serif; transition: border-color 0.15s; }
.fi:focus { outline: none; border-color: #7B3CFF; box-shadow: 0 0 0 2px #f0ebff; }
textarea.fi { resize: vertical; min-height: 56px; line-height: 1.5; }
select.fi { cursor: pointer; }
.hotel-entry { background: #f7f7f7; border-radius: 6px; padding: 10px; margin-bottom: 8px; border: 1px solid #ececec; }
.hotel-entry-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.hotel-entry-label { font-size: 10px; font-weight: 600; color: #7B3CFF; }
.btn-add-hotel { width: 100%; padding: 7px; font-size: 11px; font-weight: 600; color: #7B3CFF; border: 1px dashed #c4a8ff; border-radius: 6px; background: none; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
.btn-add-hotel:hover { background: #f0ebff; }
.no-edit-note { padding: 10px 0; font-size: 11px; color: #bbb; text-align: center; }
.imgmap-wrap { position: relative; display: inline-block; width: 100%; cursor: crosshair; user-select: none; }
.imgmap-wrap img { display: block; width: 100%; border-radius: 6px; }
.imgmap-area { position: absolute; border: 2px solid #7B3CFF; background: rgba(123,60,255,0.15); border-radius: 3px; cursor: move; }
.imgmap-area.selected { border-color: #e24b4a; background: rgba(226,75,74,0.15); }
.imgmap-area-label { position: absolute; top: 2px; left: 4px; font-size: 10px; font-weight: 700; color: #7B3CFF; pointer-events: none; }
.imgmap-area.selected .imgmap-area-label { color: #e24b4a; }
.imgmap-hint { font-size: 11px; color: #aaa; margin-top: 6px; text-align: center; }
.area-entry { background: #f7f7f7; border: 1px solid #ececec; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
.area-entry-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.area-entry-label { font-size: 10px; font-weight: 600; color: #7B3CFF; cursor: pointer; }
.btn-upload-img { width: 100%; padding: 28px 0; border: 2px dashed #e0e0e0; border-radius: 8px; background: #fafafa; cursor: pointer; font-size: 12px; color: #aaa; text-align: center; margin-bottom: 8px; transition: all 0.15s; }
.btn-upload-img:hover { border-color: #7B3CFF; color: #7B3CFF; background: #f5f0ff; }
input[type=file].fi-file { display: none; }

.right { flex: 1; background: #e5e5e5; display: flex; flex-direction: column; overflow: hidden; }
.right-header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; }
.right-header span { font-size: 12px; font-weight: 600; color: #999; }
.preview-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
.preview-wrap::-webkit-scrollbar { width: 6px; }
.preview-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
.email-frame { width: 600px; max-width: 100%; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

/* SortableJS */
.block-item.sortable-ghost { opacity: 0; }
.block-item.sortable-drag { opacity: 1 !important; box-shadow: 0 8px 24px rgba(123,60,255,0.2); border-color: #7B3CFF !important; }
.block-item.sortable-chosen { border-color: #7B3CFF; box-shadow: 0 2px 8px rgba(123,60,255,0.1); }

/* UNSUB VIEW */
#view-unsub { padding: 68px 32px 40px; max-width: 900px; margin: 0 auto; }
.unsub-section { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
.unsub-section-head { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
.unsub-section-title { font-size: 14px; font-weight: 600; color: #181818; }
.unsub-count-badge { font-size: 11px; font-weight: 600; background: #f0ebff; color: #7B3CFF; padding: 3px 10px; border-radius: 20px; }
.unsub-table { width: 100%; border-collapse: collapse; }
.unsub-table th { padding: 10px 20px; text-align: left; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.4px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.unsub-table td { padding: 11px 20px; font-size: 13px; color: #333; border-bottom: 1px solid #f8f8f8; }
.unsub-table tr:last-child td { border-bottom: none; }
.unsub-table tr:hover td { background: #fafafa; }
.unsub-empty { padding: 40px; text-align: center; font-size: 13px; color: #bbb; }
.url-gen-box { background: #fafafa; border-radius: 8px; padding: 16px 20px; }
.url-gen-row { display: flex; gap: 8px; margin-top: 8px; }
.url-gen-result { margin-top: 10px; font-size: 11px; color: #555; word-break: break-all; background: #fff; border: 1px solid #e8e8e8; border-radius: 6px; padding: 10px 12px; display: none; font-family: monospace; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: #181818; color: #fff; font-size: 12px; padding: 10px 18px; border-radius: 8px; opacity: 0; transform: translateY(6px); transition: all 0.2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="#7B3CFF"/><path d="M5 10h10M10 5v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    <span id="topbar-title">트립비토즈 <small>이메일 에디터</small></span>
    <input id="tpl-name-input" placeholder="템플릿 이름 입력..." style="display:none">
  </div>
  <div class="topbar-right" id="topbar-list-actions">
    <button class="btn-top secondary" onclick="showView('unsub')">수신거부 관리</button>
    <button class="btn-top primary" onclick="newTemplate()">+ 새 템플릿</button>
  </div>
  <div class="topbar-right" id="topbar-editor-actions" style="display:none">
    <button class="btn-top secondary" onclick="goList()">← 목록</button>
    <button class="btn-top secondary" onclick="saveTemplate()">💾 저장</button>
    <button class="btn-top primary" onclick="copyHTML()">HTML 복사</button>
  </div>
  <div class="topbar-right" id="topbar-unsub-actions" style="display:none">
    <button class="btn-top secondary" onclick="showView('list')">← 목록</button>
  </div>
</div>

<!-- ══ LIST VIEW ══ -->
<div id="view-list" class="view active">
  <div class="list-header">
    <div>
      <div class="list-title">템플릿 목록</div>
      <div class="list-sub" id="tpl-count"></div>
    </div>
    <button class="btn-primary" onclick="newTemplate()">+ 새 템플릿 만들기</button>
  </div>
  <div class="tpl-grid" id="tpl-grid"></div>
</div>

<!-- ══ UNSUB VIEW ══ -->
<div id="view-unsub" class="view">
  <div class="list-header">
    <div>
      <div class="list-title">수신 거부 관리</div>
      <div class="list-sub">수신 거부를 요청한 이메일 목록입니다.</div>
    </div>
  </div>

  <div class="unsub-section">
    <div class="unsub-section-head">
      <div class="unsub-section-title">수신거부 URL 생성기</div>
    </div>
    <div style="padding:16px 20px">
      <div style="font-size:12px;color:#888;margin-bottom:8px">이메일 주소를 입력하면 해당 수신자용 수신거부 링크를 생성합니다.</div>
      <div class="url-gen-row">
        <input class="fi" id="unsub-email-input" type="email" placeholder="user@example.com" style="flex:1;max-width:320px">
        <button class="btn-primary" style="font-size:12px;padding:7px 16px" onclick="generateUnsubUrlForInput()">URL 생성</button>
      </div>
      <div class="url-gen-result" id="unsub-url-result"></div>
    </div>
  </div>

  <div class="unsub-section">
    <div class="unsub-section-head">
      <div class="unsub-section-title">수신거부 목록</div>
      <span class="unsub-count-badge" id="unsub-count">0명</span>
    </div>
    <table class="unsub-table">
      <thead>
        <tr>
          <th>이메일</th>
          <th>거부 일시</th>
          <th>템플릿</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="unsub-list-body">
        <tr><td colspan="4" class="unsub-empty">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ══ EDITOR VIEW ══ -->
<div id="view-editor" class="view">
  <div class="left">
    <div class="left-header">
      <h2>블록 에디터</h2>
      <p>블록 추가 후 순서를 드래그로 조정하세요</p>
    </div>
    <div class="add-bar">
      <div class="add-bar-label">블록 추가</div>
      <button class="add-btn" onclick="addBlock('logo')">🏷 로고</button>
      <button class="add-btn" onclick="addBlock('title')">✏️ 타이틀</button>
      <button class="add-btn" onclick="addBlock('text')">📝 텍스트</button>
      <button class="add-btn" onclick="addBlock('highlight')">🔖 강조박스</button>
      <button class="add-btn" onclick="addBlock('hotels')">🏨 호텔그리드</button>
      <button class="add-btn" onclick="addBlock('reservation')">📋 예약내역표</button>
      <button class="add-btn" onclick="addBlock('cta')">🔗 버튼</button>
      <button class="add-btn" onclick="addBlock('divider')">➖ 구분선</button>
      <button class="add-btn" onclick="addBlock('notice')">⚠️ 안내사항</button>
      <button class="add-btn" onclick="addBlock('imagemap')">🖼 이미지+링크</button>
      <button class="add-btn" onclick="addBlock('banner')">📡 앱배너</button>
      <button class="add-btn" onclick="addBlock('footer')">📋 푸터</button>
    </div>
    <div class="block-list" id="block-list"></div>
  </div>
  <div class="right">
    <div class="right-header">
      <span>미리보기 — 600px</span>
      <span id="block-count" style="font-size:11px;color:#bbb"></span>
    </div>
    <div class="preview-wrap">
      <div class="email-frame" id="preview"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STORAGE (Supabase)
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://vihwzugbrulsxbembkby.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpaHd6dWdicnVsc3hiZW1ia2J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTI1NjAsImV4cCI6MjA5MDA4ODU2MH0.Gnh1verFEqdCD77puXRL3CA3vAu1oaW7DGxxyzlqv5U';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════
let currentView = 'list';
let currentTplId = null;

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('topbar-list-actions').style.display = name === 'list' ? 'flex' : 'none';
  document.getElementById('topbar-editor-actions').style.display = name === 'editor' ? 'flex' : 'none';
  document.getElementById('topbar-unsub-actions').style.display = name === 'unsub' ? 'flex' : 'none';
  document.getElementById('tpl-name-input').style.display = name === 'editor' ? 'block' : 'none';
  currentView = name;
  if(name === 'list') renderTemplateList();
  if(name === 'unsub') renderUnsubList();
}

function goList() { showView('list'); }

function newTemplate() {
  currentTplId = null;
  blocks = [];
  nextId = 1;
  document.getElementById('tpl-name-input').value = '';
  showView('editor');
  render(); rp();
}

async function editTemplate(id) {
  const { data: tpl, error } = await sb.from('templates').select('*').eq('id', id).single();
  if(error || !tpl) return;
  currentTplId = id;
  blocks = tpl.blocks || [];
  nextId = blocks.length > 0 ? Math.max(...blocks.map(b => b.id)) + 1 : 1;
  document.getElementById('tpl-name-input').value = tpl.name || '';
  showView('editor');
  render(); rp();
}

// ═══════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════
async function renderTemplateList() {
  const { data: list, error } = await sb.from('templates').select('*').order('updated_at', { ascending: false });
  if(error) { console.error(error); return; }
  document.getElementById('tpl-count').textContent = `총 ${list.length}개`;
  const grid = document.getElementById('tpl-grid');
  if(list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="6" width="32" height="36" rx="4" stroke="#ddd" stroke-width="2"/><path d="M16 16h16M16 22h16M16 28h10" stroke="#ddd" stroke-width="2" stroke-linecap="round"/></svg>
      <p>아직 템플릿이 없어요</p>
      <small>+ 새 템플릿 만들기를 눌러 시작하세요</small>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(t => {
    const scale = (260 / 600).toFixed(4);
    const thumb = t.html
      ? `<div class="tpl-thumb-inner" style="transform:scale(${scale})">${t.html}</div>`
      : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ddd;font-size:12px">미리보기 없음</div>`;
    const updated = t.updated_at
      ? new Date(t.updated_at).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '';
    return `<div class="tpl-card">
      <div class="tpl-thumb" onclick="editTemplate('${t.id}')">
        ${thumb}
        <div class="tpl-thumb-overlay"><span>편집하기</span></div>
      </div>
      <div class="tpl-info">
        <div class="tpl-name">${t.name || '제목 없는 템플릿'}</div>
        <div class="tpl-meta">수정: ${updated}</div>
      </div>
      <div class="tpl-actions">
        <button class="btn-secondary" onclick="editTemplate('${t.id}')">✏️ 편집</button>
        <button class="btn-secondary" onclick="duplicateTemplate('${t.id}')">복사</button>
        <button class="btn-danger" onclick="deleteTemplate('${t.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

async function duplicateTemplate(id) {
  const { data: src, error } = await sb.from('templates').select('*').eq('id', id).single();
  if(error || !src) return;
  const now = new Date().toISOString();
  const { error: err } = await sb.from('templates').insert({
    name: (src.name || '템플릿') + ' 복사본',
    blocks: src.blocks,
    html: src.html,
    created_at: now,
    updated_at: now
  });
  if(err) { showToast('복사 실패'); console.error(err); return; }
  renderTemplateList();
  showToast('복사되었어요');
}

async function deleteTemplate(id) {
  const { data: tpl } = await sb.from('templates').select('name').eq('id', id).single();
  if(!confirm(`"${tpl?.name||'이 템플릿'}"을 삭제할까요?`)) return;
  const { error } = await sb.from('templates').delete().eq('id', id);
  if(error) { showToast('삭제 실패'); console.error(error); return; }
  renderTemplateList();
  showToast('삭제되었어요');
}

// UNSUBSCRIBE
// ═══════════════════════════════════════════
const UNSUB_SECRET = 'tripbtoz-unsub-2025';

async function generateUnsubToken(email) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(UNSUB_SECRET),
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(email.toLowerCase().trim()));
  return btoa(String.fromCharCode(...new Uint8Array(sig)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function getUnsubUrl(email) {
  const token = await generateUnsubToken(email);
  const base = window.location.href.replace(/[^/]*$/, 'unsubscribe.html');
  return `${base}?e=${btoa(email)}&t=${token}`;
}

async function generateUnsubUrlForInput() {
  const email = document.getElementById('unsub-email-input').value.trim();
  if(!email) return;
  const url = await getUnsubUrl(email);
  const el = document.getElementById('unsub-url-result');
  el.style.display = 'block';
  el.innerHTML = `<span style="color:#888">수신거부 URL:</span><br>${url}<br><br>
    <button class="btn-secondary" style="font-size:11px;padding:4px 10px" onclick="navigator.clipboard.writeText('${url}').then(()=>showToast('복사됨'))">복사</button>`;
}

async function renderUnsubList() {
  const { data, error } = await sb.from('unsubscribers').select('*').order('unsubscribed_at', { ascending: false });
  const tbody = document.getElementById('unsub-list-body');
  if(error) { tbody.innerHTML = `<tr><td colspan="4" class="unsub-empty">로딩 실패</td></tr>`; return; }
  document.getElementById('unsub-count').textContent = `${data.length}명`;
  if(data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="unsub-empty">수신거부 내역이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r => {
    const dt = r.unsubscribed_at
      ? new Date(r.unsubscribed_at).toLocaleDateString('ko-KR', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '-';
    return `<tr>
      <td>${r.email}</td>
      <td style="color:#999">${dt}</td>
      <td style="color:#bbb;font-size:12px">${r.source_template || '-'}</td>
      <td><button class="btn-danger" style="font-size:11px;padding:4px 10px" onclick="removeUnsub('${r.email}')">해제</button></td>
    </tr>`;
  }).join('');
}

async function removeUnsub(email) {
  if(!confirm(`"${email}" 수신거부를 해제할까요?`)) return;
  const { error } = await sb.from('unsubscribers').delete().eq('email', email);
  if(error) { showToast('해제 실패'); return; }
  showToast('수신거부 해제됨');
  renderUnsubList();
}

const BLOCK_NAMES = {
  logo:'로고', title:'타이틀', text:'텍스트', highlight:'강조박스',
  hotels:'호텔그리드', reservation:'예약내역표', cta:'버튼(CTA)', divider:'구분선',
  notice:'안내사항', imagemap:'이미지+링크', banner:'앱배너', footer:'푸터'
};

let blocks = [], nextId = 1, sortable = null;

function addBlock(type) {
  const defaults = {
    logo:{}, title:{text:'새 타이틀', size:'24'}, text:{text:'텍스트를 입력하세요.'},
    highlight:{label:'강조 문구', sublabel:''},
    hotels:{hotels:[{name:'',area:'',price:'',img:'',link:''}]},
    reservation:{title:'예약 내역', rows:[
      {label:'예약번호',value:'${bookingId}'},{label:'숙소명',value:'${hotelName}'},
      {label:'숙소 주소',value:'${hotelAddress}'},{label:'예약일',value:'${checkin} ~ ${checkout} (${stayday}박)'},
    ], ctaText:'상세 내역 보기', ctaLink:'https://www.tripbtoz.com/mypage/reserve/${bookingId}'},
    cta:{text:'버튼 텍스트', link:'https://tripbtoz.com', style:'fill'},
    divider:{}, notice:{n1:'안내 문구 1', n2:'안내 문구 2'},
    imagemap:{src:'', naturalW:600, naturalH:300, areas:[]}, banner:{}, footer:{}
  };
  blocks.forEach(b => b.open = false);
  blocks.push({id:nextId++, type, open:true, data:{...defaults[type]}});
  render(); rp();
  setTimeout(() => { const el = document.getElementById('block-list'); el.scrollTop = el.scrollHeight; }, 60);
}

function moveBlock(idx, dir) {
  const ni = idx + dir;
  if(ni < 0 || ni >= blocks.length) return;
  [blocks[idx], blocks[ni]] = [blocks[ni], blocks[idx]];
  render(); rp();
}

function removeBlock(idx) {
  if(!confirm(`"${BLOCK_NAMES[blocks[idx].type]}" 블록을 삭제할까요?`)) return;
  blocks.splice(idx, 1); render(); rp();
}

function toggleBlock(idx) {
  const wasOpen = blocks[idx].open;
  blocks.forEach(b => b.open = false);
  blocks[idx].open = !wasOpen;
  render();
}

function getSummary(b) {
  if(!b.data) return '';
  if(b.type==='title') return b.data.text?.split('\n')[0]||'';
  if(b.type==='text') return (b.data.text||'').substring(0,50);
  if(b.type==='highlight') return b.data.label||'';
  if(b.type==='cta') return b.data.text||'';
  if(b.type==='hotels') return `${b.data.hotels?.length||0}개 호텔 카드`;
  if(b.type==='reservation') return b.data.title||'예약 내역';
  if(b.type==='notice') return (b.data.n1||'').substring(0,40);
  if(b.type==='imagemap') return b.data.src ? `${b.data.areas?.length||0}개 영역` : '이미지 없음';
  return '';
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const list = document.getElementById('block-list');
  list.innerHTML = blocks.map((b,i) => `
    <div class="block-item${b.open?' active':''}" data-id="${b.id}">
      <div class="block-header" onclick="toggleBlock(${i})">
        <span class="drag-handle">⠿</span>
        <span class="block-badge">${BLOCK_NAMES[b.type]}</span>
        <span class="block-summary">${getSummary(b)}</span>
        <div class="block-actions">
          <button class="ba" onclick="event.stopPropagation();moveBlock(${i},-1)">↑</button>
          <button class="ba" onclick="event.stopPropagation();moveBlock(${i},1)">↓</button>
          <button class="ba del" onclick="event.stopPropagation();removeBlock(${i})">✕</button>
        </div>
        <span class="block-chevron">▼</span>
      </div>
      <div class="block-editor${b.open?' open':''}">${renderEditor(b,i)}</div>
    </div>`).join('');
  document.getElementById('block-count').textContent = `${blocks.length}개 블록`;
  if(sortable) sortable.destroy();
  sortable = Sortable.create(list, {
    handle: '.block-header',
    filter: '.block-actions,.block-actions *,.block-chevron',
    preventOnFilter: false,
    animation: 180, easing: 'cubic-bezier(0.25,1,0.5,1)',
    ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen', dragClass: 'sortable-drag',
    scroll: true, scrollSensitivity: 80, scrollSpeed: 14,
    onEnd(evt) {
      if(evt.oldIndex===evt.newIndex) return;
      const moved = blocks.splice(evt.oldIndex,1)[0];
      blocks.splice(evt.newIndex,0,moved);
      render(); rp();
    }
  });
}

  if(b.type==='title') { const lines=(b.data.text||'').split('\n').join('<br>'); return `<tr><td style="padding:28px 32px 12px;font-size:${b.data.size||24}px;color:#181818;line-height:1.4;${FF}"><b>${lines}</b></td></tr>`; }
  if(b.type==='text') { const lines=(b.data.text||'').split('\n').join('<br>'); return `<tr><td style="padding:8px 32px 20px;font-size:15px;color:#333;line-height:170%;${FF}">${lines}</td></tr>`; }
  if(b.type==='highlight') return `<tr><td style="padding:4px 32px 20px"><div style="background:#fff8e1;border-left:3px solid #f5a623;border-radius:0 6px 6px 0;padding:14px 18px"><div style="font-size:14px;font-weight:bold;color:#181818;margin-bottom:4px;${FF}">${b.data.label||''}</div>${b.data.sublabel?`<div style="font-size:13px;color:#666;${FF}">${b.data.sublabel}</div>`:''}</div></td></tr>`;
  if(b.type==='cta') { const s=b.data.style==='outline'?'border:2px solid #7B3CFF;color:#7B3CFF;background:#fff':'background:#7B3CFF;color:#fff;border:2px solid #7B3CFF'; return `<tr><td align="center" style="padding:16px 0 24px"><a href="${b.data.link||'#'}" style="display:inline-block;padding:13px 36px;border-radius:6px;font-size:15px;font-weight:bold;text-decoration:none;${s};${FF}">${b.data.text||'버튼'}</a></td></tr>`; }
  if(b.type==='notice') return `<tr><td style="padding:0 20px 24px"><table cellpadding="0" cellspacing="0" style="width:100%;background:#f6f6f6;border-radius:8px"><tr><td style="padding:18px 24px;font-size:13px;color:#6a6a6a;line-height:22px;${FF}"><b>꼭! 확인해주세요.</b><ul style="margin:10px 0 0 18px;padding:0">${b.data.n1?`<li style="margin-bottom:6px">${b.data.n1}</li>`:''}${b.data.n2?`<li>${b.data.n2}</li>`:''}</ul></td></tr></table></td></tr>`;
  if(b.type==='reservation') {
    const rows=b.data.rows||[];
    const rowsHTML=rows.map(r=>`<tr><td width="32"></td><td style="width:140px;padding:14px 0 14px 24px;font-size:15px;color:#818286;vertical-align:top;line-height:1.5;border-bottom:1px solid #f0f0f0;${FF}">${r.label}</td><td style="padding:14px 24px 14px 16px;font-size:15px;color:#121212;vertical-align:top;line-height:1.5;border-bottom:1px solid #f0f0f0;${FF}">${r.value}</td><td width="32"></td></tr>`).join('');
    return `<tr><td style="padding:8px 0 0"><table cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;margin:0 auto"><tbody><tr><td width="32"></td><td colspan="2" style="height:2px;background:#121212;padding:0"></td><td width="32"></td></tr><tr><td width="32"></td><td colspan="2" style="padding:14px 0 14px 24px;font-size:17px;color:#121212;border-bottom:2px solid #eee;${FF}"><b>${b.data.title||'예약 내역'}</b></td><td width="32"></td></tr>${rowsHTML}</tbody></table></td></tr>${b.data.ctaText?`<tr><td align="center" style="padding:24px 0 28px;${FF}"><a href="${b.data.ctaLink||'#'}" style="display:inline-block;padding:13px 32px;border-radius:6px;background:#7B3CFF;color:#fff;font-size:15px;text-decoration:none;${FF}"><b>${b.data.ctaText}</b></a></td></tr>`:''}<tr><td style="padding:0 32px"><div style="height:1px;background:#eee"></div></td></tr>`;
  }
  if(b.type==='imagemap') {
    if(!b.data.src) return '<tr><td style="padding:8px 32px;font-size:12px;color:#aaa;text-align:center">이미지를 업로드해주세요</td></tr>';
    const pad=b.data.padding!=null?b.data.padding:32;
    const imgW=600-pad*2;
    const radius=pad>0?'border-radius:8px;':'';
    const imgStyle=`display:inline-block;border:0;max-width:${imgW}px;width:100%;${radius}`;
    if(b.data.fullLink) return `<tr><td align="center" style="padding:8px ${pad}px"><a href="${b.data.fullLinkHref||'#'}" target="_blank" style="display:block;line-height:0"><img src="${b.data.src}" width="${imgW}" alt="${b.data.fullLinkAlt||''}" style="${imgStyle}"></a></td></tr>`;
    const nw=b.data.naturalW||600, nh=b.data.naturalH||300;
    const mapId=`map_${b.id}`;
    const areas=(b.data.areas||[]).map(a=>`<area shape="rect" alt="${a.alt||''}" coords="${Math.round(a.px/100*nw)},${Math.round(a.py/100*nh)},${Math.round((a.px+a.pw)/100*nw)},${Math.round((a.py+a.ph)/100*nh)}" href="${a.href||'#'}" target="_blank">`).join('');
    return `<tr><td align="center" style="padding:8px ${pad}px"><img src="${b.data.src}" width="${imgW}" usemap="#${mapId}" style="${imgStyle}"><map name="${mapId}" id="${mapId}">${areas}</map></td></tr>`;
  }
  if(b.type==='hotels') {
    const hs=b.data.hotels||[];
    const card=h=>{
      const img=h.img?`<img src="${h.img}" width="100%" style="display:block;height:150px;object-fit:cover">`:`<div style="width:100%;height:150px;background:#c8b9a8;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;color:#888">이미지</span></div>`;
      return `<table cellpadding="0" cellspacing="0" style="width:100%;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;background:#fff"><tr><td>${img}</td></tr><tr><td style="padding:12px 14px;${FF}"><div style="font-size:14px;font-weight:bold;color:#181818;margin-bottom:3px">${h.name||'호텔명'}</div><div style="font-size:12px;color:#818286;margin-bottom:10px">${h.area||''}</div><div style="font-size:16px;font-weight:bold;color:#181818">${h.price||''}</div><div style="font-size:11px;color:#818286;margin-top:2px">1박 기준</div></td></tr></table>`;
    };
    const rows=[];
    for(let i=0;i<hs.length;i+=2) rows.push(`<tr><td width="32"></td><td style="padding:0 5px 10px 0;vertical-align:top;width:262px">${card(hs[i])}</td><td style="padding:0 0 10px 5px;vertical-align:top;width:262px">${hs[i+1]?card(hs[i+1]):''}</td><td width="32"></td></tr>`);
    return `<tr><td style="padding:4px 0 8px"><table cellpadding="0" cellspacing="0" width="100%">${rows.join('')}</table></td></tr>`;
  }
  return '';
}

function rp() {
  const rows = blocks.map(b => blockToHTML(b)).join('\n');
  document.getElementById('preview').innerHTML = `<table cellpadding="0" cellspacing="0" width="100%" style="background:#fff;border-collapse:collapse">${rows}</table>`;
}

// ═══════════════════════════════════════════
// IMAGE MAP
// ═══════════════════════════════════════════
let imDrawing=false, imStartX=0, imStartY=0, imCurIdx=-1;

function handleImgUpload(e, idx) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      blocks[idx].data.src = ev.target.result;
      blocks[idx].data.naturalW = img.naturalWidth;
      blocks[idx].data.naturalH = img.naturalHeight;
      blocks[idx].data.areas = [];
      blocks[idx].open = true;
      render(); rp();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function imGetRelPos(e, wrap) {
  const r = wrap.getBoundingClientRect();
  return { x: Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)), y: Math.max(0,Math.min(1,(e.clientY-r.top)/r.height)) };
}

function imStartDraw(e, idx) {
  if(e.target.classList.contains('imgmap-area')) return;
  imDrawing=true; imCurIdx=idx;
  const wrap=document.getElementById(`imwrap-${idx}`);
  const pos=imGetRelPos(e,wrap);
  imStartX=pos.x; imStartY=pos.y;
  const box=document.getElementById(`imdrawbox-${idx}`);
  box.style.cssText=`display:block;position:absolute;border:2px dashed #7B3CFF;background:rgba(123,60,255,0.1);pointer-events:none;left:${imStartX*100}%;top:${imStartY*100}%;width:0;height:0`;
  e.preventDefault();
}

function _imFinish(e) {
  if(!imDrawing) return;
  const idx=imCurIdx; imDrawing=false; imCurIdx=-1;
  const wrap=document.getElementById(`imwrap-${idx}`); if(!wrap) return;
  const box=document.getElementById(`imdrawbox-${idx}`); if(box) box.style.display='none';
  const pos=imGetRelPos(e,wrap);
  const px=Math.min(imStartX,pos.x)*100, py=Math.min(imStartY,pos.y)*100;
  const pw=Math.abs(pos.x-imStartX)*100, ph=Math.abs(pos.y-imStartY)*100;
  if(pw<2||ph<2) return;
  blocks[idx].data.areas.forEach(a=>a.selected=false);
  blocks[idx].data.areas.push({px,py,pw,ph,href:'',alt:'',selected:true});
  render(); rp();
}

function imSelectArea(idx, ai) { blocks[idx].data.areas.forEach((a,i)=>a.selected=(i===ai)); render(); }

document.addEventListener('mouseup', e => { if(imDrawing) _imFinish(e); });
document.addEventListener('mousemove', e => {
  if(!imDrawing) return;
  const wrap=document.getElementById(`imwrap-${imCurIdx}`); if(!wrap) return;
  const pos=imGetRelPos(e,wrap);
  const x=Math.min(imStartX,pos.x), y=Math.min(imStartY,pos.y);
  const box=document.getElementById(`imdrawbox-${imCurIdx}`); if(!box) return;
  box.style.left=(x*100)+'%'; box.style.top=(y*100)+'%';
  box.style.width=(Math.abs(pos.x-imStartX)*100)+'%'; box.style.height=(Math.abs(pos.y-imStartY)*100)+'%';
});

// ═══════════════════════════════════════════
// SAVE / COPY
// ═══════════════════════════════════════════
async function saveTemplate() {
  const name = document.getElementById('tpl-name-input').value.trim() || '제목 없는 템플릿';
  const html = document.getElementById('preview').innerHTML;
  const now = new Date().toISOString();
  if(currentTplId) {
    const { error } = await sb.from('templates').update({ name, blocks, html, updated_at: now }).eq('id', currentTplId);
    if(error) { showToast('저장 실패'); console.error(error); return; }
  } else {
    const { data, error } = await sb.from('templates').insert({ name, blocks, html, created_at: now, updated_at: now }).select('id').single();
    if(error) { showToast('저장 실패'); console.error(error); return; }
    currentTplId = data.id;
  }
  showToast('💾 저장되었어요');
}

function copyHTML() {
  const html = document.getElementById('preview').innerHTML;
  navigator.clipboard.writeText(html).then(() => showToast('✅ HTML 복사됨')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = html; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ HTML 복사됨');
  });
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderTemplateList();
